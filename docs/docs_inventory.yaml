# Documentation inventory rules (paths relative to repo root).
rules:
  - pattern: "docs/ordia/**"
    lifecycle: CORE
    language: English
    category: product
  - pattern: "docs/ordia/archive/**"
    lifecycle: ARCHIVE
    language: English
    category: historical
  - pattern: "packages/ordia-core/docs/**"
    lifecycle: CORE
    language: English
    category: package-manual
