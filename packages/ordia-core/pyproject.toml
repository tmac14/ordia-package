[project]
name = "ordia-core"
version = "0.14.0"
description = "Ordia durable agent orchestration and implementation control"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
license-files = ["LICENSE"]
dependencies = ["pyyaml"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Quality Assurance",
]

[project.urls]
Homepage = "https://github.com/tmac14/ordia-package"
Documentation = "https://github.com/tmac14/ordia-package/tree/main/packages/ordia-core/docs"
Repository = "https://github.com/tmac14/ordia-package"

[project.scripts]
ordia = "ordia.cli:main"

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "pytest-cov>=5,<7",
  "ruff>=0.8,<1",
  "mypy>=1.13,<2",
  "build>=1.2,<2",
  "twine>=5,<7",
  "pre-commit>=4,<5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra --strict-markers --cov=ordia --cov-report=term-missing --cov-fail-under=80"
markers = [
  "integration: subprocess or temp filesystem tests",
  "wheel: pip install smoke (slow)",
  "product: repo-level product audits",
]

[tool.coverage.run]
omit = [
  "ordia/cursor_bundle/hooks/*",
  "ordia/cursor_bundle/hooks/lib/*",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
packages = ["ordia"]
ignore_missing_imports = true

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["ordia*"]

[tool.setuptools.package-data]
ordia = ["templates/**/*", "protocols/*.md", "commands/*.json", "workflows/**/*", "product_docs/*.md", "schemas/*.json", "cursor_bundle/**/*", "cursor_bundle/hooks.manifest.json", "cursor_bundle/rules.manifest.json"]

[tool.setuptools.data-files]
"share/doc/ordia-core" = ["docs/*.md"]
