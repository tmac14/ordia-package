schema_version: 1
updated_at: "2026-06-14"

intents:
  - id: recover
    category: control
    title: Recover session after context loss
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: null
    template: control.md
    requires_task: false
    related_commands: []
    end_state: RECOVERY_READY
    body_hint: Bootstrap from ORCHESTRATION_STATE, TASK_REGISTRY, and active task packet.

  - id: handoff
    category: control
    title: Runtime handoff between control planes
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: null
    template: control.md
    requires_task: false
    related_commands: []
    end_state: HANDOFF_CONFIRMED
    body_hint: Follow RUNTIME_HANDOFF_PROTOCOL — snapshot, validate, reconcile, resume.

  - id: orchestrate_batch
    category: control
    title: Generate next executor prompt batch
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: null
    template: control.md
    requires_task: true
    related_commands: ["ordia:model:recommend", "ordia:prompt"]
    end_state: NEXT_PROMPT_READY
    body_hint: Produce a self-contained IMPLEMENTATION prompt per orchestration protocol.

  - id: evaluate_plan
    category: control
    title: Evaluate agent plan submission
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: null
    template: control.md
    requires_task: true
    related_commands: []
    end_state: APPROVED
    body_hint: Verdict APPROVED | APPROVED_WITH_NOTES | NEEDS_REVISION | BLOCKED.

  - id: evaluate_report
    category: control
    title: Evaluate executor implementation report
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: null
    template: control.md
    requires_task: true
    related_commands: ["control:validate"]
    end_state: ACCEPT
    body_hint: Verdict ACCEPT | ACCEPT_WITH_NOTES | NEEDS_MORE_PROOF | REJECT.

  - id: task_create
    category: control
    title: Create new task packet and registry entry
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: null
    template: control.md
    requires_task: false
    related_commands: ["control:validate"]
    end_state: TASK_DRAFT
    body_hint: Draft from TASK_PACKET_TEMPLATE; do not mark VALIDATED without evidence.

  - id: task_resume
    category: control
    title: Resume in-flight task at next safe action
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: null
    template: control.md
    requires_task: true
    related_commands: []
    end_state: RECOVERY_READY
    body_hint: Read task packet next_safe_action and ORCHESTRATION_STATE §0.

  - id: discover
    category: planning
    title: Discovery and diagnosis phase
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: Plan
    template: planning.md
    requires_task: true
    related_commands: []
    end_state: DISCOVERY
    body_hint: Read-only diagnosis; no product edits unless explicitly approved.

  - id: plan
    category: planning
    title: Plan Mode — options and recommendation
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: Plan
    template: planning.md
    requires_task: true
    related_commands: []
    end_state: PLAN_READY
    body_hint: Final decision PLAN_READY | NEEDS_DECISION | BLOCKED.

  - id: approve_implementation
    category: planning
    title: User approval for UNIFIED implementation slice
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: null
    template: planning.md
    requires_task: true
    related_commands: []
    end_state: IMPLEMENTATION_APPROVED
    body_hint: User replies APPROVE IMPLEMENTATION (or equivalent) before product edits.

  - id: approve_model
    category: planning
    title: Approve model tier for task
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: null
    template: planning.md
    requires_task: true
    related_commands: ["ordia:model:recommend", "ordia:model:usage-template"]
    end_state: MODEL_TIER_APPROVED
    body_hint: Run model recommend; user replies APPROVE MODEL T*.

  - id: confirm_locks
    category: planning
    title: Confirm parallel-safety locks
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: null
    template: planning.md
    requires_task: true
    related_commands: ["control:validate"]
    end_state: LOCKS_CONFIRMED
    body_hint: Record locks in TASK_REGISTRY before READY_FOR_IMPLEMENTATION.

  - id: implement
    category: work
    title: Generic approved implementation
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: Agent
    template: work.md
    requires_task: true
    related_commands: ["ordia:model:recommend", "control:validate"]
    end_state: IMPLEMENTED_AND_VALIDATED
    body_hint: Execute approved plan within allowed scope only.

  - id: implement_feature
    category: work
    title: Implement new feature
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: Agent
    template: work.md
    requires_task: true
    related_commands: ["ordia:model:recommend", "control:validate"]
    end_state: IMPLEMENTED_AND_VALIDATED
    body_hint: Deliver feature per acceptance criteria in task packet.

  - id: fix_bug
    category: work
    title: Fix bug with root-cause focus
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: Agent
    template: work.md
    requires_task: true
    related_commands: ["ordia:model:recommend", "control:validate"]
    end_state: IMPLEMENTED_AND_VALIDATED
    body_hint: Reproduce, fix root cause, add regression test when applicable.

  - id: refactor
    category: work
    title: Scoped refactor without behavior change
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: Agent
    template: work.md
    requires_task: true
    related_commands: ["control:validate"]
    end_state: IMPLEMENTED_AND_VALIDATED
    body_hint: No behavior change unless task packet explicitly allows it.

  - id: continue_wip
    category: work
    title: Continue work in progress
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: Agent
    template: work.md
    requires_task: true
    related_commands: ["ordia:model:recommend"]
    end_state: IMPLEMENTED_AND_VALIDATED
    body_hint: Resume at next_safe_action from task packet; do not restart from scratch.

  - id: validate
    category: quality
    title: Run validation gates
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: Agent
    template: quality.md
    requires_task: true
    related_commands: ["control:validate", "ordia:validate"]
    end_state: VALIDATION_PENDING
    body_hint: Execute mandatory regressions from task packet and COMMANDS.md.

  - id: qa
    category: quality
    title: QA pass (read-only visual/behavioral)
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: QA
    template: quality.md
    requires_task: true
    related_commands: []
    end_state: QA_ACCEPT
    body_hint: No production edits; produce QA report with screenshots when applicable.

  - id: audit
    category: quality
    title: Read-only audit
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    mode: Audit
    template: quality.md
    requires_task: true
    related_commands: []
    end_state: AUDIT_COMPLETE
    body_hint: Read-only; cite evidence paths; no product changes.

  - id: close_task
    category: quality
    title: Task closure gate (RUNTIME-D006)
    runtime: ONLY_CURSOR
    protocol: ORCHESTRATION
    mode: null
    template: quality.md
    requires_task: true
    related_commands: ["control:validate", "ordia:validate:strict-model"]
    end_state: VALIDATED
    body_hint: QA ACCEPT -> EVIDENCE_INDEX -> packet -> registry -> state -> control:validate.
