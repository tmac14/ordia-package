# Greenfield profile — Ordia model tier overlay (ORDIA-D022)
schema_version: 1
profile: default
updated_at: "2026-06-14"

default_tier: T1
require_approval_above: T1

cost_bands:
  T0: minimal
  T1: low
  T2: medium
  T3: high

economic_ratings:
  T0: { en: light, es: leve }
  T1: { en: light, es: leve }
  T2: { en: medium, es: mediana }
  T3: { en: heavy, es: pesada }

cursor:
  T0: { primary: auto }
  T1: { primary: auto }
  T2: { primary: composer-2.5 }
  T3: { primary: claude-sonnet-4-6 }

codex:
  T0: { primary: gpt-5-mini }
  T1: { primary: gpt-5-mini }
  T2: { primary: gpt-5-codex }
  T3: { primary: gpt-5.3-codex }

model_slug_tiers:
  - pattern: "*opus*"
    tier: T3
  - pattern: "*sonnet*"
    tier: T2
  - pattern: "*codex*"
    tier: T2
  - pattern: "*composer*"
    tier: T2
  - pattern: "*mini*"
    tier: T1
  - pattern: "auto"
    tier: T1
