name: test



on:

  push:

    branches: [main]

  pull_request:



jobs:

  lint:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - run: python -m pip install -U pip

      - run: pip install -e "packages/ordia-core[dev]"

      - run: ruff check packages/ordia-core/ordia packages/ordia-core/tests tools

      - run: ruff format --check packages/ordia-core/ordia packages/ordia-core/tests tools



  typecheck:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - run: pip install -e "packages/ordia-core[dev]"

      - run: mypy packages/ordia-core/ordia



  test:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        python-version: ["3.11", "3.12", "3.13"]

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: ${{ matrix.python-version }}

      - run: python -m pip install -U pip

      - run: pip install -e "packages/ordia-core[dev]"

      - run: python tools/sync_cursor_bundle.py --check --product-only

      - run: pytest packages/ordia-core/tests -m "not wheel" --cov-fail-under=80

      - if: matrix.python-version == '3.11'

        run: pytest packages/ordia-core/tests -m wheel --no-cov



  audits:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - uses: actions/setup-node@v4

        with:

          node-version: "20"

      - run: pip install -e packages/ordia-core

      - run: python tools/audits/product_docs_sync.py --check

      - run: python tools/audits/docs_links.py --strict

      - run: python tools/audits/docs_inventory.py --check

      - run: python tools/verify_version_parity.py --check

      - run: npm pack --dry-run

        working-directory: packages/ordia-cursor



  example-smoke:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - run: pip install -e packages/ordia-core

      - run: |

          python - <<'PY'

          import json, subprocess, sys, tempfile

          from pathlib import Path

          repo = Path.cwd()

          cli = [sys.executable, "-m", "ordia.cli"]

          with tempfile.TemporaryDirectory() as tmp:

              target = Path(tmp)

              subprocess.run([*cli, "init", "--with-cursor", "--directory", str(target), "--profile", "example"], check=True, cwd=repo)

              doctor = subprocess.run([*cli, "doctor", "--json", "--directory", str(target)], capture_output=True, text=True, check=True, cwd=repo)

              doc = json.loads(doctor.stdout)

              assert doc["ok"], doctor.stdout

              validate = subprocess.run([*cli, "validate", "--project", "--json", "--directory", str(target)], capture_output=True, text=True, check=True, cwd=repo)

              val = json.loads(validate.stdout)

              assert val["ok"], validate.stdout

              prompt = subprocess.run([*cli, "prompt", "emit", "--intent", "recover", "--directory", str(target)], capture_output=True, text=True, check=True, cwd=repo)

              assert "intent: recover" in prompt.stdout

              summary = subprocess.run([*cli, "task", "summary", "--json", "--directory", str(target)], capture_output=True, text=True, check=True, cwd=repo)

              sm = json.loads(summary.stdout)

              assert sm["ok"], summary.stdout

              subprocess.run([*cli, "cursor", "sync", "--directory", str(target)], check=True, cwd=repo)

              subprocess.run([*cli, "cursor", "sync", "--directory", str(target)], check=True, cwd=repo)

              subprocess.run([*cli, "init", "--skip-existing", "--directory", str(target)], check=True, cwd=repo)

              reg = target / "docs" / "control" / "TASK_REGISTRY.yaml"

              reg.write_text(reg.read_text(encoding="utf-8").replace("tasks: []", """tasks:
  - id: EX-001
    status: IN_FLIGHT
    owner: orchestrator
    runtime: ONLY_CURSOR
    protocol: IMPLEMENTATION
    task_packet: src/**""").replace("in_flight: []", "in_flight: [EX-001]"), encoding="utf-8")

              transition = subprocess.run(
                  [*cli, "task", "transition", "--task", "EX-001", "--status", "IMPLEMENTED", "--json", "--directory", str(target)],
                  capture_output=True, text=True, check=True, cwd=repo,
              )

              tr = json.loads(transition.stdout)

              assert tr["ok"], transition.stdout

              import importlib.util, io, json as jsonlib, sys as pysys
              from unittest.mock import patch

              hooks_lib = target / ".cursor" / "hooks"
              pysys.path.insert(0, str(hooks_lib))
              from lib import control_context

              session = {"runtime": "ONLY_CURSOR", "protocol": "ORCHESTRATION", "session_mode": "MULTI_CHAT"}
              blocked, _ = control_context.product_edit_blocked(session, "src/example.ts", target)
              assert blocked, "ORCHESTRATION should block product path edits"

              header_path = hooks_lib / "validate_runtime_header.py"
              spec = importlib.util.spec_from_file_location("validate_runtime_header_smoke", header_path)
              mod = importlib.util.module_from_spec(spec)
              assert spec and spec.loader
              spec.loader.exec_module(mod)
              payload = {"prompt": "Please fix src/example.ts", "workspace_roots": [str(target)]}
              stdin_backup = pysys.stdin
              pysys.stdin = io.StringIO(jsonlib.dumps(payload))
              try:
                  with patch.object(mod, "load_full_session", return_value=None):
                      with patch.object(mod, "persist_session_from_state", return_value=False):
                          with patch.object(mod, "emit_json") as emit_mock:
                              code = mod._main()
              finally:
                  pysys.stdin = stdin_backup
              assert code == 2, "header hook should deny without session"
              assert emit_mock.call_args[0][0]["permission"] == "deny"

          print("example-smoke: PASS")

          PY


