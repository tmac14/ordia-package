name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip
      - run: pip install -e "packages/ordia-core[dev]"
      - run: ruff check packages/ordia-core/ordia packages/ordia-core/tests tools
      - run: ruff format --check packages/ordia-core/ordia packages/ordia-core/tests tools

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "packages/ordia-core[dev]"
      - run: mypy packages/ordia-core/ordia

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -U pip
      - run: pip install -e "packages/ordia-core[dev]"
      - run: python tools/sync_cursor_bundle.py --check --product-only
      - run: pytest packages/ordia-core/tests -m "not wheel" --cov-fail-under=70
      - if: matrix.python-version == '3.11'
        run: pytest packages/ordia-core/tests -m wheel

  audits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e packages/ordia-core
      - run: python tools/audits/product_docs_sync.py --check
      - run: python tools/audits/docs_links.py --strict
      - run: python tools/audits/docs_inventory.py --check
