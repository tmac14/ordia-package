name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ordia-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip build
      - run: pip install -e packages/ordia-core
      - run: python scripts/sync_ordia_cursor_bundle.py --check --product-only
      - run: python scripts/run_ordia_tests.py
