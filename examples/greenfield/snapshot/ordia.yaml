# Ordia greenfield template — render with ordia init
version: "0.3"
profile: "greenfield-example"

control:
  root: docs/control
  state: ORCHESTRATION_STATE.md
  taskRegistry: TASK_REGISTRY.yaml
  agentRegistry: AGENT_REGISTRY.yaml
  decisionLog: DECISION_LOG.md
  evidenceIndex: EVIDENCE_INDEX.md
  taskPackets: tasks
  projectProfile: PROFILE.md

commands:
  catalog: commands.catalog.json
  profileDoc: COMMANDS.md
  npmPackage: package.json
  validateOnControlCheck: false

session:
  runtimes:
    - ONLY_CODEX
    - CODEX_PLUS_CURSOR
    - ONLY_CURSOR
  protocols:
    - ORCHESTRATION
    - IMPLEMENTATION
  modes:
    - MULTI_CHAT
    - UNIFIED

enforcement:
  productRoots:
    - "src/"
  controlRoots:
    - docs/control/
    - docs/ordia/
    - .cursor/rules/
    - .cursor/hooks/
    - AGENTS.md
    - ordia.yaml
  qaEvidenceRoots:
    - temp/qa/
  orchestrationBlocksProduct: true
  unifiedRequiresApproval: true

closure:
  validator: ordia validate --project

models:
  registry: docs/control/MODEL_REGISTRY.yaml
  telemetryRoot: temp/qa/model-usage
  defaultTier: T1
  requireApprovalAbove: T1
