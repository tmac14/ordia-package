# Ordia reference monorepo — examples/reference-monorepo (Ordia 0.18.0)
version: "0.3"
profile: "reference-demo"

control:
  root: docs/control
  state: ORCHESTRATION_STATE.md
  taskRegistry: TASK_REGISTRY.yaml
  agentRegistry: AGENT_REGISTRY.yaml
  decisionLog: DECISION_LOG.md
  evidenceIndex: EVIDENCE_INDEX.md
  taskPackets: tasks
  projectProfile: PROFILE.md

commands:
  catalog: commands.catalog.json
  profileDoc: COMMANDS.md
  npmPackage: package.json
  validateOnControlCheck: false

session:
  runtimes:
    - ONLY_CODEX
    - CODEX_PLUS_CURSOR
    - ONLY_CURSOR
  protocols:
    - ORCHESTRATION
    - IMPLEMENTATION
  modes:
    - MULTI_CHAT
    - UNIFIED

enforcement:
  productRoots:
    - apps/
  controlRoots:
    - docs/control/
    - docs/ordia/
    - .cursor/rules/
    - .cursor/hooks/
    - AGENTS.md
    - ordia.yaml
  qaEvidenceRoots:
    - temp/qa/
  orchestrationBlocksProduct: true
  unifiedRequiresApproval: true

closure:
  validator: ordia validate --project

profileExtensions:
  validateInventory: true
  inventoryDoc: DOCUMENTATION_INVENTORY.yaml

workflows:
  overlay: docs/control/workflows/intents.overlay.yaml

models:
  registry: docs/control/MODEL_REGISTRY.yaml
  telemetryRoot: temp/qa/model-usage
  defaultTier: T1
  requireApprovalAbove: T1
